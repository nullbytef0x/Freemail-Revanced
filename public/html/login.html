<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Freemail Revanced</title>
    <style>.precheck-hide body{ visibility: hidden; }</style>
    <script>
      // Check login status immediately (before any other scripts)
      (function(){
        try{
          var hasToken = document.cookie.split(';').some(function(c){ 
            return c.trim().indexOf('iding-session=') === 0; 
          });
          
          // If there's a cookie but redirected from another page, verify validity before redirecting
          // Avoid redirect loops and page flashing caused by invalid cookies
          if (hasToken && document.referrer) {
            // Verify asynchronously, don't block page rendering
            (async function(){
              try{
                const controller = new AbortController();
                const tid = setTimeout(function(){ try{ controller.abort(); }catch(_){ } }, 1500);
                const r = await fetch('/api/session', { 
                  method: 'GET', 
                  headers: { 'Cache-Control': 'no-cache' },
                  credentials: 'include',
                  signal: controller.signal
                });
                clearTimeout(tid);
                if (r && r.ok){
                  location.replace('/');
                } else {
                  // Cookie is invalid, clear it
                  document.cookie = 'iding-session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                }
              }catch(_){ 
                // Verification failed, stay on login page
              }
            })();
            return;
          } else if (hasToken && !document.referrer) {
            // Direct access to login page with cookie, redirect immediately
            location.replace('/');
            return;
          }
          
          // No cookie, do a network check (cookie may have just been set)
          fetch('/api/session', { 
            method: 'GET', 
            headers: { 'Cache-Control': 'no-cache' },
            credentials: 'include'
          }).then(function(r){
            if (r && r.ok){
              location.replace('/');
            }
          }).catch(function(){ 
            // Session check failed, stay on login page
          });
        }catch(_){ 
          // Error handling, stay on login page
        }
      })();
    </script>
    <script src="/js/auth-guard.js"></script>
    <script>
      // Redirect to home if already logged in; skip check for logout scenario
      (function(){
        try{ document.documentElement.classList.add('precheck-hide'); }catch(_){ }
        try{
          var u = new URL(location.href);
          var fromLogout = (u.searchParams.get('from') === 'logout') || (sessionStorage.getItem('mf:just_logged_out') === '1');
          if (fromLogout){
            sessionStorage.removeItem('mf:just_logged_out');
            document.documentElement.classList.remove('precheck-hide');
            return;
          }
        }catch(_){ }
        // Cookie check already done at top of page, skip duplicate check
        // 2) Network fallback with extended timeout to reduce false negatives
        try{
          var controller = new AbortController();
          var tid = setTimeout(function(){ try{ controller.abort(); }catch(_){ } }, 1500); // Extended from 500ms to 1500ms
          fetch('/api/session', { 
            headers: { 'Cache-Control': 'no-cache' }, 
            signal: controller.signal,
            credentials: 'include'
          })
            .then(function(r){
              clearTimeout(tid);
              if (r && r.ok){ location.replace('/'); return; }
              document.documentElement.classList.remove('precheck-hide');
            })
            .catch(function(){ try{ document.documentElement.classList.remove('precheck-hide'); }catch(_){ } });
        }catch(_){ try{ document.documentElement.classList.remove('precheck-hide'); }catch(_){ } }
        // Max 2s fallback display (extended from 1s to 2s)
        setTimeout(function(){ try{ document.documentElement.classList.remove('precheck-hide'); }catch(_){ } }, 2000);
      })();
    </script>
    
    <script src="/js/mock.js"></script>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/login.css" />
    <link rel="stylesheet" href="/css/theme-clean.css" />
  </head>
  <body>
    <div class="bg"></div>
    <div class="center">
      <div class="card">
        <div class="logo"><img class="logo-image" src="/favicon.svg" alt="Freemail logo" /></div>
        <h1>Log In to Freemail Revanced</h1>
        <div id="err" class="err"></div>
        <input id="username" class="input" type="text" placeholder="Username / Email" />
        <input id="pwd" class="input" type="password" placeholder="Password" />
        <div style="font-size:12px;color:#64748b;margin-bottom:8px">
          Account: guest, Password: admin, enters view-only mode.
        </div>
        <button id="login" class="btn">Log In</button>
      </div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="/js/toast-utils.js"></script>
    <script src="/js/login.js"></script>
  </body>
  </html>
